<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        
        /* Layout Principal */
        .app-container { display: flex; flex: 1; overflow: hidden; padding: 8px; gap: 8px; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: #121212; border-radius: 8px; padding: 16px; }
        
        /* Contenido Principal */
        .main-view { flex: 1; background: #121212; border-radius: 8px; padding: 24px; overflow-y: auto; }
        
        /* Reproductor inferior */
        .player-bar { height: 90px; background: #000; padding: 0 16px; display: flex; align-items: center; }
        
        /* Estilos de ejemplo para tarjetas */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        .card { background: #181818; padding: 16px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <h3>Tu biblioteca</h3>
            </aside>

        <main class="main-view">
            <h1>Sumérgete de nuevo en tu música</h1>
            <div class="grid">
                <div class="card">Imagen + Texto (Bad Bunny)</div>
                <div class="card">Imagen + Texto (Rauw Alejandro)</div>
            </div>
        </main>
    </div>

    <footer class="player-bar">
        <div>Controles de reproducción</div>
    </footer>

</body>
</html>
