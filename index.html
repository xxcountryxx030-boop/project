<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BoxPixelWeb | Home</title>
    <style>
        body { margin: 0; font-family: 'Courier New', monospace; background: #0d0d0d; color: #fff; display: flex; }
        nav { width: 220px; height: 100vh; background: #1a1a1a; padding: 20px; border-right: 2px solid #333; position: fixed; }
        .logo { font-size: 1.2rem; color: #00ffcc; margin-bottom: 40px; font-weight: bold; }
        nav ul { list-style: none; padding: 0; }
        nav li { padding: 15px 0; border-bottom: 1px solid #222; cursor: pointer; color: #aaa; }
        nav li:hover { color: #fff; }
        
        main { margin-left: 260px; padding: 40px; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .card { background: #161616; border: 2px solid #333; padding: 20px; transition: 0.3s; }
        .card:hover { border-color: #00ffcc; }
        
        /* Nueva sección footer/gaming */
        .gaming-footer { margin-top: 50px; padding: 20px; border-top: 2px solid #00ffcc; }
        .footer-tag { color: #00ffcc; font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BOXPIXEL</div>
        <ul>
            <li onclick="window.location.href='#home'">🏠 Inicio</li>
            <li onclick="window.location.href='#proyectos'">🎮 Proyectos</li>
            <li onclick="window.location.href='#herramientas'">🛠 Herramientas</li>
        </ul>
    </nav>

    <main id="home">
        <h1>Dashboard</h1>
        <p>Bienvenido al hub central.</p>

        <div class="grid">
            <div class="card"><h3>Juego 1</h3><p>Acción / Plataformas</p></div>
            <div class="card"><h3>Juego 2</h3><p>Puzzle / Estrategia</p></div>
        </div>

        <section class="gaming-footer">
            <h2>BoxPixelWeb</h2>
            <div class="footer-tag">Categoría: Gaming & Development</div>
            <p>Construyendo el futuro de los juegos indie.</p>
        </section>
    </main>

</body>
</html>
