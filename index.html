<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Google</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#202124;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* NAVBAR */
.topbar{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding:20px;
    gap:20px;
    font-size:14px;
}

.topbar a{
    color:white;
    text-decoration:none;
}

.profile{
    width:35px;
    height:35px;
    border-radius:50%;
    background:#607d8b;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

/* CENTRO */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin-top:-80px;
}

.logo{
    font-size:90px;
    font-weight:500;
    margin-bottom:30px;
}

/* BUSCADOR */
.search-box{
    width:700px;
    max-width:90%;
    background:#4d5156;
    border-radius:30px;
    display:flex;
    align-items:center;
    padding:12px 20px;
    gap:15px;
}

.search-box input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:16px;
}

.icon{
    font-size:20px;
    cursor:pointer;
}

/* BOTONES */
.buttons{
    margin-top:30px;
    display:flex;
    gap:15px;
}

.buttons button{
    background:#303134;
    border:none;
    color:white;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:14px;
}

.buttons button:hover{
    border:1px solid #5f6368;
}

/* FOOTER */
.footer{
    background:#171717;
    color:#999;
    font-size:14px;
}

.footer-top{
    padding:15px 30px;
    border-bottom:1px solid #333;
}

.footer-bottom{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    padding:15px 30px;
}

.footer-links{
    display:flex;
    gap:25px;
}

.footer a{
    color:#ccc;
    text-decoration:none;
}

.footer a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="topbar">
    <a href="#">Gmail</a>
    <a href="#">Imágenes</a>
    <div style="font-size:22px;">⋮⋮</div>
    <div class="profile">D</div>
</div>

<!-- CENTRO -->
<div class="main">

    <div class="logo">Google</div>

    <div class="search-box">
        <div class="icon">＋</div>

        <input 
        type="text" 
        id="searchInput"
        placeholder="Buscar en Google">

        <div class="icon">🎤</div>
        <div class="icon">📷</div>

        <button onclick="buscar()" 
        style="
        background:#5f6368;
        border:none;
        color:white;
        padding:10px 18px;
        border-radius:20px;
        cursor:pointer;
        ">
        ✨ Modo IA
        </button>
    </div>

    <div class="buttons">
        <button onclick="buscar()">
            Buscar con Google
        </button>

        <button onclick="suerte()">
            Voy a tener suerte
        </button>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">

    <div class="footer-top">
        Argentina
    </div>

    <div class="footer-bottom">

        <div class="footer-links">
            <a href="#">Sobre Google</a>
            <a href="#">Publicidad</a>
            <a href="#">Negocios</a>
            <a href="#">Cómo funciona la Búsqueda</a>
        </div>

        <div class="footer-links">
            <a href="#">Privacidad</a>
            <a href="#">Condiciones</a>
            <a href="#">Configuración</a>
        </div>

    </div>

</div>

<script>
function buscar(){
    let texto = document.getElementById("searchInput").value;

    if(texto.trim() !== ""){
        window.location.href =
        "https://www.google.com/search?q=" +
        encodeURIComponent(texto);
    }
}

function suerte(){
    let texto = document.getElementById("searchInput").value;

    if(texto.trim() !== ""){
        window.location.href =
        "https://www.google.com/search?btnI=I&q=" +
        encodeURIComponent(texto);
    }
}

/* ENTER PARA BUSCAR */
document.getElementById("searchInput")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        buscar();
    }
});
</script>

</body>
</html>
